    <!-- Favicon -->
    <link href="/images/favicon/apple-touch-icon.png" rel="apple-touch-icon" sizes="180x180">
    <link href="/images/favicon/favicon-32x32.png" rel="icon" sizes="32x32" type="image/png">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .container {
            max-width: 520px;
            justify-content: center;
            padding: 3rem 1.5rem 4rem;
        }

        header {
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 2.5rem 0 0.5rem;
            gap: 1.25rem;
        }

        .logo-container {
            order: 1;
            width: 80px;
            height: 80px;
        }

        h1 {
            order: 2;
            font-size: 2.75rem;
            flex: none;
        }

        .tagline {
            order: 3;
            color: var(--text-secondary);
            font-size: 0.95rem;
            letter-spacing: 0.02em;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 2.5rem;
        }

        .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-secondary);
            opacity: 0.4;
            padding-left: 0.25rem;
            margin-top: 0.75rem;
        }

        .section-label:first-child {
            margin-top: 0;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 1.25rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.975rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.5s ease-out backwards;
            position: relative;
            overflow: hidden;
        }

        .link-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: translateX(-100%);
            transition: 0.5s;
        }

        .link-item:hover::before { transform: translateX(100%); }

        .link-item:hover {
            background: var(--card-hover);
            border-color: rgba(255,255,255,0.12);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px -10px rgba(38, 91, 255, 0.3);
        }

        .link-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .link-icon svg { width: 20px; height: 20px; }

        .link-label { flex: 1; }

        .link-arrow {
            opacity: 0.25;
            transition: opacity 0.2s, transform 0.2s;
            flex-shrink: 0;
        }

        .link-item:hover .link-arrow {
            opacity: 0.6;
            transform: translateX(3px);
        }

        /* Staggered animations */
        .link-item:nth-child(1)  { animation-delay: 0.05s; }
        .link-item:nth-child(2)  { animation-delay: 0.1s;  }
        .link-item:nth-child(3)  { animation-delay: 0.15s; }
        .link-item:nth-child(4)  { animation-delay: 0.2s;  }
        .link-item:nth-child(5)  { animation-delay: 0.25s; }
        .link-item:nth-child(6)  { animation-delay: 0.3s;  }
        .link-item:nth-child(7)  { animation-delay: 0.35s; }

        @media (max-width: 992px) {
            header { flex-direction: column; align-items: center; }
            .logo-container { order: 1; }
            h1 { order: 2; font-size: 2.5rem; }
        }
    </style>
</head>
